# .github/workflows/deploy.yml
# ──────────────────────────────────────────────────────────────────
# Automatically builds and deploys the app to GitHub Pages whenever
# a commit is pushed to the main branch.
#
# Live URL after first deploy:
#   https://tanhoang0803.github.io/product-sales-analytics/

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main        # trigger on every push to main

  # Allow manual runs from the GitHub Actions tab
  workflow_dispatch:

# Grant the workflow permission to write to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist   # Vite outputs to /dist by default

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
